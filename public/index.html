<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlite</title>
    <link rel="icon" type="image/png" href="spotlite.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation (Desktop & Tablet) -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <a href="index.html" class="brand-header-container">
                    <img src="spotlite.png" alt="Spotlite Logo" class="brand-logo-img">
                    <span class="insta-logo-text">Spotlite</span>
                </a>
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item active">
                    <a href="index.html">
                        <svg viewBox="0 0 24 24"><path d="M9.005 16.545a2.997 2.997 0 0 1 2.997-2.997A3 3 0 0 1 15 16.545V22h-5.995v-5.455Z" fill="currentColor"/><path d="M12 .726a1 1 0 0 0-1.28.053l-8.995 8.16A1 1 0 0 0 2.414 10.5H5v10.5a1 1 0 0 0 1 1h4v-5.455a2 2 0 0 1 2-2 2 2 0 0 1 2 2V22h4a1 1 0 0 0 1-1V10.5h2.586a1 1 0 0 0 .689-1.56l-8.995-8.161A1 1 0 0 0 12 .726Z"/></svg>
                        <span>Home</span>
                    </a>
                </li>
                <li class="menu-item">
                    <button id="sidebar-search-btn">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke-width="2"/></svg>
                        <span>Search</span>
                    </button>
                </li>
                <li class="menu-item">
                    <a href="messages.html">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-width="2" fill="none"/></svg>
                        <span>Messages</span>
                    </a>
                </li>
                <li class="menu-item">
                    <button id="open-create-btn">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="16" stroke-width="2"/><line x1="8" y1="12" x2="16" y2="12" stroke-width="2"/></svg>
                        <span>Create</span>
                    </button>
                </li>
                <li class="menu-item">
                    <a href="#" id="sidebar-profile-link">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke-width="2"/><path d="M6 19.5c1-2.5 3-4.5 6-4.5s5 2 6 4.5" stroke-width="2"/></svg>
                        <span>Profile</span>
                    </a>
                </li>
                <li class="menu-item">
                    <button id="open-settings-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="2" fill="none"/></svg>
                        <span>Settings</span>
                    </button>
                </li>
                <li class="menu-item" style="margin-top: auto;">
                    <button id="logout-btn">
                        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-width="2" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke-width="2" stroke-linecap="round"/></svg>
                        <span>Log Out</span>
                    </button>
                </li>
            </ul>
        </aside>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav class="bottom-nav">
            <ul class="bottom-nav-menu">
                <li>
                    <a href="index.html">
                        <svg viewBox="0 0 24 24"><path d="M12 .726a1 1 0 0 0-1.28.053l-8.995 8.16A1 1 0 0 0 2.414 10.5H5v10.5a1 1 0 0 0 1 1h4v-5.455a2 2 0 0 1 2-2 2 2 0 0 1 2 2V22h4a1 1 0 0 0 1-1V10.5h2.586a1 1 0 0 0 .689-1.56l-8.995-8.161A1 1 0 0 0 12 .726Z" fill="currentColor"/></svg>
                    </a>
                </li>
                <li>
                    <button id="mobile-open-create-btn">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="16" stroke-width="2"/><line x1="8" y1="12" x2="16" y2="12" stroke-width="2"/></svg>
                    </button>
                </li>
                <li>
                    <a href="#" id="mobile-profile-link">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke-width="2"/><path d="M6 19.5c1-2.5 3-4.5 6-4.5s5 2 6 4.5" stroke-width="2"/></svg>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="content-container">
                <!-- Feed Column -->
                <section class="feed-column">
                    <!-- Stories Bar (populated dynamically from real users) -->
                    <div class="stories-container" id="stories-container">
                        <!-- Real user stories loaded by app.js -->
                    </div>

                    <!-- Posts Stream -->
                    <div id="posts-stream">
                        <!-- Dynamic posts loaded by app.js -->
                        <div class="loading-state" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            Loading feed posts...
                        </div>
                    </div>
                </section>

                <!-- Sidebar (Right Column) -->
                <section class="sidebar-right">
                    <!-- Current User Card -->
                    <div class="user-profile-card" id="current-user-card">
                        <div class="user-card-info" id="current-user-nav">
                            <img src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=default" alt="Profile" class="user-card-avatar" id="current-user-avatar">
                            <div class="user-card-names">
                                <span class="user-card-username" id="current-user-username">username</span>
                                <span class="user-card-fullname" id="current-user-bio">View Profile</span>
                            </div>
                        </div>
                    </div>

                    <!-- Suggestions list -->
                    <div class="suggestions-section">
                        <div class="suggestions-header">
                            <span class="suggestions-title">Suggestions for you</span>
                        </div>
                        <div class="suggestions-list" id="suggestions-container">
                            <!-- Dynamic suggestions loaded by app.js -->
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- CREATE POST MODAL -->
    <div class="modal-overlay" id="create-post-modal-overlay">
        <div class="modal-content create-post-modal">
            <div class="modal-header">
                <h3 class="modal-title">Create new post</h3>
                <button class="modal-close-btn" id="close-create-modal">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <button class="modal-next-btn" id="submit-post-btn">Share</button>
            </div>
            
            <!-- File Drop / Paste Link area -->
            <div class="drag-drop-area" id="drop-area">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p>Drag photos here or click to upload</p>
                <label for="post-file-input" style="color: var(--accent-blue); font-weight: 600; cursor: pointer;">Select from computer</label>
                <input type="file" id="post-file-input" accept="image/*" style="display: none;">
                
                <p style="margin-top: 15px; font-size: 0.85rem;">Or paste an image URL:</p>
                <input type="text" id="post-url-input" placeholder="https://example.com/image.jpg" style="background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); width: 80%; font-size: 0.85rem;">
            </div>

            <!-- Preview and Caption Area (Visible after selecting image) -->
            <div class="preview-container" id="image-preview-container">
                <img src="" alt="Preview" class="preview-image" id="preview-img-element">
                <button class="remove-preview-btn" id="remove-preview-btn">&times;</button>
            </div>

            <div class="modal-caption-area" id="caption-area" style="display: none;">
                <textarea class="caption-textarea" id="post-caption-input" placeholder="Write a caption..."></textarea>
            </div>
        </div>
    </div>

    <!-- SEARCH PANEL SLIDEOUT -->
    <div class="search-slider-panel" id="search-slider-panel">
        <h2 class="search-header">Search</h2>
        <div class="search-input-wrapper">
            <input type="text" id="search-users-input" placeholder="Search accounts...">
        </div>
        <div class="search-results-list" id="search-results-list">
            <!-- Dynamic search results loaded here -->
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settings-modal-overlay">
        <div class="modal-content settings-modal">
            <h2 class="settings-tab-title">Settings</h2>
            
            <!-- Privacy Section -->
            <div class="privacy-toggle-wrapper">
                <div class="privacy-label">
                    <span class="privacy-title">Private Account</span>
                    <span class="privacy-desc">Only people you approve can see your photos.</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="privacy-toggle-input">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Password Reset Section -->
            <div class="form-group" style="margin-top: 10px;">
                <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 8px;">Change Password</h3>
                <label for="settings-old-password">Current Password</label>
                <input type="password" id="settings-old-password" placeholder="Current password">
            </div>
            <div class="form-group">
                <label for="settings-new-password">New Password</label>
                <input type="password" id="settings-new-password" placeholder="New password">
            </div>
            
            <div class="error-message" id="settings-error" style="color: var(--accent-red); font-size: 0.85rem; display: none;"></div>
            <div class="success-message" id="settings-success" style="color: #27ae60; font-size: 0.85rem; display: none; font-weight: 600;"></div>

            <div class="edit-profile-actions">
                <button class="btn-secondary" id="close-settings-btn">Close</button>
                <button class="btn-primary" id="save-settings-btn" style="margin-top: 0; padding: 10px 20px;">Update Password</button>
            </div>
        </div>
    </div>

    <!-- SHARE POST MODAL -->
    <div class="share-modal-overlay" id="share-modal-overlay">
        <div class="share-modal-sheet" id="share-modal-sheet">
            <div class="share-modal-header">
                <span class="share-modal-title">Share to...</span>
                <button class="share-modal-close" id="share-modal-close">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="share-search-wrapper">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="share-search-input" placeholder="Search people..." autocomplete="off">
            </div>
            <div class="share-users-list" id="share-users-list">
                <!-- populated dynamically -->
            </div>
            <div class="share-modal-footer">
                <button class="share-send-btn" id="share-send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initFeedPage();
        });
    </script>
</body>
</html>
